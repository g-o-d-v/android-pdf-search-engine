                            'POM_NAME',
                            'PUBLISH_NAME',
                            'Android PDF Search Engine'
                    )
                    description = propertyOrEnv(
                            'POM_DESCRIPTION',
                            'PUBLISH_DESCRIPTION',
                            'Android PDF text-layer and OCR search library with persistent page indexing.'
                    )
                    url = propertyOrEnv(
                            'POM_URL',
                            'PUBLISH_URL',
                            'https://github.com/g-o-d-v/android-pdf-search-engine'
                    )

                    licenses {
                        license {
                            name = 'Apache License, Version 2.0'
                            url = 'https://www.apache.org/licenses/LICENSE-2.0.txt'
                            distribution = 'repo'
                        }
                    }

                    developers {
                        developer {
                            id = propertyOrEnv('POM_DEVELOPER_ID', 'PUBLISH_DEVELOPER_ID', 'g-o-d-v')
                            name = propertyOrEnv('POM_DEVELOPER_NAME', 'PUBLISH_DEVELOPER_NAME', 'g-o-d-v')
                            email = propertyOrEnv('POM_DEVELOPER_EMAIL', 'PUBLISH_DEVELOPER_EMAIL', '3472966871@qq.com')
                        }
                    }

                    scm {
                        url = propertyOrEnv(
                                'POM_SCM_URL',
                                'PUBLISH_SCM_URL',
                                'https://github.com/g-o-d-v/android-pdf-search-engine'
                        )
                        connection = propertyOrEnv(
                                'POM_SCM_CONNECTION',
                                'PUBLISH_SCM_CONNECTION',
                                'scm:git:https://github.com/g-o-d-v/android-pdf-search-engine.git'
                        )
                        developerConnection = propertyOrEnv(
                                'POM_SCM_DEV_CONNECTION',
                                'PUBLISH_SCM_DEV_CONNECTION',
                                'scm:git:ssh://git@github.com/g-o-d-v/android-pdf-search-engine.git'
                        )
                    }
                }
            }
        }

        repositories {
            maven {
                name = 'localBuild'
                url = layout.buildDirectory.dir('repo')
            }
        }
    }

    tasks.named('generateReleaseChecksums').configure {
        dependsOn 'publishReleasePublicationToLocalBuildRepository'
    }

    tasks.register('releaseCandidate') {
        group = 'publishing'
        description = 'Builds, tests and verifies the same release AAR that JitPack publishes.'
        dependsOn 'testReleaseUnitTest'
        dependsOn ':sample:assembleRelease'
        dependsOn 'lintRelease'
        dependsOn 'verifyReleaseAar'
        dependsOn 'publishReleasePublicationToLocalBuildRepository'
        dependsOn 'generateReleaseChecksums'
    }
}
