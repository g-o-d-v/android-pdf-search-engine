name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android packages
        run: |
          yes | sdkmanager --licenses >/dev/null 2>&1 || true
          sdkmanager \
            "platforms;android-35" \
            "build-tools;35.0.0" \
            "ndk;21.4.7075529" \
            "cmake;3.22.1"

      - name: Set up Gradle cache
        uses: gradle/actions/setup-gradle@v4

      - name: Repository preflight
        run: |
          python tools/check_jitpack_ready.py
          python tools/verify_native_libs.py \
            --require-abis arm64-v8a,armeabi-v7a \
            src/main/jniLibs

      - name: Build and verify AAR
        run: |
          chmod +x gradlew
          ./gradlew clean testReleaseUnitTest verifyReleaseAar :sample:assembleDebug --no-daemon --stacktrace
